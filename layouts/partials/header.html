<header class="header">
    <nav class="header-nav">
      <div class="logo">
        <a href="{{ .Site.Home.RelPermalink }}" accesskey="h" title="{{ .Site.Title }} (Alt + H)">{{ .Site.Title }}</a>
        <div class="logo-switches">
          <button id="theme-toggle" class="theme-toggle" accesskey="t" title="(Alt + T)" aria-label="Toggle theme">
            <svg class="moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            <svg class="sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </div>
      </div>
      <ul id="menu" class="menu">
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" title="{{ .Name }}">
            <span>{{ .Name }}</span>
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>
    <div id="search"></div>
  </header>
