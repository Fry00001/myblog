{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  <div class="post-content">
    {{ .Content }}
    <div class="video-grid">
      <!-- 在这里粘贴你的B站视频嵌入代码，每个视频一个 iframe -->
      <div class="video-item">
        <iframe src="//player.bilibili.com/player.html?bvid=BV1Z24y1K7NW" 
                scrolling="no" border="0" frameborder="no" framespacing="0" 
                allowfullscreen="true" width="100%" height="200"></iframe>
      </div>
      <div class="video-item">
        <iframe src="//player.bilibili.com/player.html?bvid=BV1Vh4y1s7ig" 
                scrolling="no" border="0" frameborder="no" framespacing="0" 
                allowfullscreen="true" width="100%" height="200"></iframe>
      </div>
      <!-- 继续添加更多视频 -->
    </div>
  </div>
</article>
{{ end }}
