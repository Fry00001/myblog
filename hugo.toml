baseURL = "https://fry.l2.ink/"
locale = "zh-cn"
title = "Fry's Website"
description = "一个记录灵感的地方"
theme = "PaperMod"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  showReadingTime = true
  showShareButtons = true
  showToc = true
  ShowSearch = true
  customCSS = ["css/custom.css"]

[[params.socialIcons]]
    name = "github"
    url = "https://github.com/Fry00001"

[[params.socialIcons]]
    name = "bilibili"
    url = "https://space.bilibili.com/1429298202"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "about"
    name = "关于本站"
    url = "/about/"
    weight = 30

[markup.goldmark.renderer]
  unsafe = true